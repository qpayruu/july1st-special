<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spl. Gift | July 1st</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            /* 浪漫花園窗紗背景 */
            background-image: url('photo_2026-06-20_16-00-15.jpg');
            background-size: cover;       
            background-position: center;   
            background-repeat: no-repeat;  
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 互動舞台區 */
        .stage-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 為 3D 翻轉提供透視感 */
        }

        /* ================= 信封結構 ================= */
        .envelope-wrapper {
            position: absolute; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 280px; 
            height: 180px;
            background-color: #ffffff; 
            box-shadow: 0 12px 35px rgba(0, 100, 150, 0.15); 
            border-radius: 0 0 10px 10px;
            z-index: 5;
            transform-origin: center center;
        }

        /* 信封上蓋（初始：向下折疊） */
        .envelope-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #f0f4f8; 
            border-bottom: 0px solid transparent;
            transform-origin: top;
            z-index: 8;
        }

        /* 信封正面口袋 */
        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid #f7fafc;
            border-right: 140px solid #f7fafc;
            border-bottom: 90px solid #e2e8f0;
            z-index: 7;
            border-radius: 0 0 10px 10px;
        }

        /* ================= 圖1：小人 (.png) ================= */
        .character {
            position: absolute;
            width: 120px;  
            height: 120px;
            background-image: url('image 1140.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            bottom: calc(50% - 90px); 
            right: -150px; 
            z-index: 10; 
            display: none;
        }

        /* ================= 3D 翻轉卡片容器 ================= */
        .card-ticket-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;  
            height: 100%; 
            z-index: 20; 
            display: none;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* 3D 翻轉本體外框 */
        .flip-card-inner {
            position: relative;
            width: 90%;
            height: 70%;
            cursor: pointer;
            pointer-events: auto; 
            transform-style: preserve-3d; /* 開啟子元件的 3D 空間渲染 */
            transform: scale(0.25); 
            opacity: 0;
        }

        /* 正反面卡片的共通樣式 */
        .flip-card-inner img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            backface-visibility: hidden; /* 翻到背面時，隱藏正面 */
            -webkit-backface-visibility: hidden;
        }

        /* 卡片 2 (背面) 初始先水平旋轉 180 度 */
        .card-back {
            transform: rotateY(180deg);
        }

        /* 提示文字修正：移到畫面上方，避免與底部按鈕重疊 */
        .save-tip {
            position: absolute;
            top: 8%; /* 固定在上方空白處 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 19px; 
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(70, 100, 150, 0.6), 0 0 15px rgba(255, 255, 255, 0.5);
            opacity: 0; 
            display: none;
            pointer-events: none;
            text-align: center;
            white-space: nowrap; /* 確保文字不換行 */
            z-index: 30;
        }

        /* ================= 按鈕常駐頂層控制區 ================= */
        .ui-overlay-container {
            position: absolute;
            bottom: 6%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 磨砂質感「天空藍」按鈕 */
        .btn {
            padding: 13px 44px;
            font-size: 16px;
            background: linear-gradient(135deg, rgba(142, 210, 255, 0.8), rgba(114, 162, 255, 0.8)); 
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(6px); 
            box-shadow: 0 8px 25px rgba(114, 162, 255, 0.25);
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 1px 4px rgba(50, 80, 130, 0.3);
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(115, 195, 255, 0.95), rgba(85, 140, 255, 0.95));
            box-shadow: 0 10px 30px rgba(85, 140, 255, 0.45);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: linear-gradient(135deg, rgba(210, 215, 225, 0.6), rgba(180, 185, 195, 0.6)) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="stage-container" id="stageContainer">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope-top" id="envTop"></div>
            <div class="envelope-front"></div>
        </div>
        
        <div class="card-ticket-container" id="ticketContainer">
            <div class="save-tip" id="saveTip">點擊卡片翻面 / 長按保存！</div>
            
            <div class="flip-card-inner" id="flipCardInner">
                <img src="Group 1597880818.png" class="card-front" id="cardFront" alt="驚喜大餐券正面">
                <img src="Frame 587054.png" class="card-back" id="cardBack" alt="驚喜大餐券背面">
            </div>
        </div>
        
        <div class="character" id="character"></div>

        <div class="ui-overlay-container">
            <button class="btn" id="startBtn"> 點擊開啟 </button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const character = document.getElementById('character');
        const envelope = document.getElementById('envelope');
        const envTop = document.getElementById('envTop');
        const ticketContainer = document.getElementById('ticketContainer');
        const flipCardInner = document.getElementById('flipCardInner');
        const saveTip = document.getElementById('saveTip');

        let isFlipped = false; // 紀錄目前卡片是否翻面
        let canFlip = false;   // 動態控制：只有當信封開啟、卡片放大定位後才允許點擊翻面

        // 點擊卡片觸發 3D 翻轉
        flipCardInner.addEventListener('click', () => {
            if (!canFlip) return; 

            isFlipped = !isFlipped;
            
            // 使用 GSAP 進行 Y 軸 180 度翻轉
            gsap.to(flipCardInner, {
                rotationY: isFlipped ? 180 : 0,
                duration: 0.6,
                ease: "power2.inOut",
                onStart: () => {
                    // 翻轉時更新提示文字
                    saveTip.innerHTML = isFlipped ? "點擊卡片翻回正面 / 長按保存！" : "點擊卡片翻面 / 長按保存！";
                }
            });
        });

        startBtn.addEventListener('click', () => {
            // 1. 鎖定按鈕與翻轉狀態
            startBtn.disabled = true;
            canFlip = false;
            isFlipped = false;
            
            // 2. 隱藏大餐券與提示字，並完整重置卡片 3D 旋轉角度
            saveTip.style.display = 'none';
            saveTip.style.opacity = '0';
            ticketContainer.style.display = 'none';
            gsap.set(flipCardInner, { opacity: 0, scale: 0.25, rotationY: 0 }); 
            
            // 3. 完整重置信封與小人初始狀態
            gsap.set(character, { display: 'block', x: 0, y: 0, scale: 1, opacity: 1, scaleX: 1 });
            gsap.set(envelope, { display: 'block', opacity: 1, scale: 1, y: 0 });
            
            gsap.set(envTop, { 
                top: 0,
                borderTop: '100px solid #f0f4f8',
                borderBottom: '0px solid transparent',
                borderLeft: '140px solid transparent',
                borderRight: '140px solid transparent'
            });

            const stageWidth = window.innerWidth;
            const targetX = -(stageWidth / 2 + 60); 

            const tl = gsap.timeline();

            // --- 第一階段：小人折返跑與跳入 ---
            tl.to(character, { x: -stageWidth - 200, duration: 2.0, ease: "power1.inOut" })
              .to(character, { scaleX: -1, duration: 0.1 })
              .to(character, { x: -stageWidth * 0.3, duration: 1.2, ease: "power1.inOut" })
              .to(character, { scaleX: 1, duration: 0.1 })
              .to(character, { x: targetX, duration: 0.9, ease: "power1.out" })
            
            // 原地興奮跳動
              .to(character, { y: -70, duration: 0.16, ease: "power1.out" })
              .to(character, { y: 0, duration: 0.16, ease: "power1.in" })
              .to(character, { y: -70, duration: 0.16, ease: "power1.out" })
              .to(character, { y: 0, duration: 0.16, ease: "power1.in" })
            
            // 跳進信封口袋中
              .to(character, { y: -160, x: targetX - 40, scale: 0.5, duration: 0.35, ease: "power1.out" })
              .to(character, { y: -10, opacity: 0, duration: 0.25, ease: "power1.in" })
              // 信封微微震動
              .to(envelope, { scale: 1.05, yoyo: true, repeat: 1, duration: 0.08 }, "-=0.2")
            
            // --- 第二階段：信封上蓋掀開 ---
              .to(envTop, { borderTop: '0px solid transparent', borderBottom: '100px solid #cbd5e1', top: -100, duration: 0.4, ease: "power1.inOut" }, "+=0.1")
            
            // --- 第三階段：信封隱藏，大餐券無縫登場並張力放大 ---
              .to(envelope, { opacity: 0, duration: 0.05 })
              .call(() => {
                  ticketContainer.style.display = 'flex';
              })
              .to(flipCardInner, {
                  opacity: 1,
                  scale: 1,
                  duration: 0.7,
                  ease: "power4.out",
                  onComplete: () => {
                      canFlip = true; // 動態放大定位完成後，允許點擊翻面
                  }
              })
            
            // --- 第四階段：完成動畫，展現提示字與重置按鈕 ---
              .call(() => {
                  saveTip.innerHTML = "點擊卡片翻面 / 長按保存！";
                  saveTip.style.display = 'block';
                  startBtn.innerHTML = " 再看一次 ";
              })
              .to(saveTip, { opacity: 1, duration: 0.4 })
              .call(() => {
                  startBtn.disabled = false;
              });
        });
    </script>
</body>
</html>
